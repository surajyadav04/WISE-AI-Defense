<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WISE: Access Severed</title>
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Rajdhani:wght@500;600;700&family=Sora:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050508;
            --danger-red: #ef4444;
            --danger-glow: rgba(239, 68, 68, 0.4);
            --primary-cyan: #00f3ff;
            --primary-glow: rgba(0, 243, 255, 0.3);
            --border-color: rgba(239, 68, 68, 0.2);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Sora', 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* Cyberpunk Grid Background */
        .cyber-grid {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(239, 68, 68, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(239, 68, 68, 0.02) 1px, transparent 1px);
            background-size: 35px 35px;
            pointer-events: none;
            z-index: 1;
        }

        /* Scanline HUD effect */
        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%, 
                rgba(0, 0, 0, 0.25) 50%
            ), linear-gradient(
                90deg,
                rgba(255, 0, 0, 0.06),
                rgba(0, 255, 0, 0.02),
                rgba(0, 0, 255, 0.06)
            );
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 5;
            opacity: 0.4;
        }

        /* Red Laser Sweep */
        .laser-sweep {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: linear-gradient(to bottom, transparent, var(--danger-red), transparent);
            box-shadow: 0 0 20px var(--danger-red);
            opacity: 0.3;
            animation: sweep 8s linear infinite;
            pointer-events: none;
            z-index: 2;
        }

        @keyframes sweep {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        .hud-frame {
            position: relative;
            z-index: 3;
            width: 90%;
            max-width: 650px;
            background: rgba(8, 8, 12, 0.85);
            border: 1px solid var(--border-color);
            border-top: 4px solid var(--danger-red);
            border-radius: 8px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 0 0 30px rgba(239, 68, 68, 0.05);
            backdrop-filter: blur(15px);
            text-align: center;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .danger-badge {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(239, 68, 68, 0.06);
            border: 2px solid var(--danger-red);
            box-shadow: 0 0 20px var(--danger-glow);
            font-size: 32px;
            margin-bottom: 24px;
            animation: pulseGlow 2s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 10px var(--danger-glow); transform: scale(1); }
            100% { box-shadow: 0 0 25px rgba(239, 68, 68, 0.7); transform: scale(1.05); }
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 38px;
            font-weight: 900;
            letter-spacing: 4px;
            margin: 0 0 6px 0;
            color: var(--danger-red);
            text-shadow: 0 0 15px var(--danger-glow);
        }

        h2 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin: 0 0 30px 0;
        }

        .box {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            padding: 24px;
            margin-bottom: 35px;
            text-align: left;
            font-family: monospace;
            font-size: 13px;
            line-height: 1.6;
        }

        .report-line {
            display: flex;
            margin-bottom: 12px;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.05);
            padding-bottom: 8px;
        }

        .report-line:last-child {
            margin-bottom: 0;
            border-bottom: none;
            padding-bottom: 0;
        }

        .field-label {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            width: 140px;
            flex-shrink: 0;
        }

        .field-value {
            color: var(--text-main);
            word-break: break-all;
        }

        .field-value.highlight {
            color: var(--danger-red);
            font-weight: bold;
            text-shadow: 0 0 5px rgba(239, 68, 68, 0.3);
        }

        /* Cyberpunk Button System */
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .btn-cyber {
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            padding: 14px 28px;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        .btn-cyber.primary {
            background: var(--danger-red);
            color: #fff;
            box-shadow: 0 0 15px var(--danger-glow);
        }

        .btn-cyber.primary:hover {
            background: #fff;
            color: var(--bg-dark);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.5);
            border-color: #fff;
        }

        .btn-cyber.info {
            background: rgba(0, 243, 255, 0.08);
            border-color: var(--primary-cyan);
            color: var(--primary-cyan);
        }

        .btn-cyber.info:hover {
            background: var(--primary-cyan);
            color: var(--bg-dark);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .btn-cyber.bypass {
            background: transparent;
            border-color: rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
        }

        .btn-cyber.bypass:hover {
            border-color: #fff;
            color: #fff;
            background: rgba(255, 255, 255, 0.02);
        }
    </style>
</head>
<body>
    <div class="cyber-grid"></div>
    <div class="scanline"></div>
    <div class="laser-sweep"></div>

    <div class="hud-frame">
        <div class="danger-badge">🚨</div>
        <h1>ACCESS SEVERED</h1>
        <h2>WISE SECURITY PROTOCOL ACTIVE</h2>

        <div class="box">
            <div class="report-line">
                <span class="field-label">VERDICT STATUS:</span>
                <span class="field-value highlight" id="verdict-text">MALICIOUS THREAT SUSPENDED</span>
            </div>
            <div class="report-line">
                <span class="field-label">IPS RATIONALE:</span>
                <span class="field-value">Connection terminated by local WISE IPS to safeguard operating boundaries.</span>
            </div>
        </div>

        <div class="btn-container">
            <button id="btn-back" class="btn-cyber primary">RETURN TO SAFETY</button>
            <button id="btn-report" class="btn-cyber info">📊 THREAT TELEMETRY</button>
            <button id="btn-proceed" class="btn-cyber bypass">⚠️ OVERRIDE & PROCEED</button>
        </div>
    </div>

    <script src="blocked.js"></script>
</body>
</html>
