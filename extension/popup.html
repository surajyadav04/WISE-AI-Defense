<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WISE - Web Intelligence Security Engine</title>
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <!-- Futuristic Grid & Scanner Lines -->
    <div class="cyber-grid"></div>
    <div class="scanline"></div>

    <div class="hud-container">
        <!-- High-Tech Navigation Tabs -->
        <div class="tabs">
            <div class="tab active" id="tab-scan">
                <span class="tab-icon">⚡</span>
                <span class="tab-text">SCANNER</span>
            </div>
            <div class="tab" id="tab-history">
                <span class="tab-icon">📜</span>
                <span class="tab-text">HISTORY</span>
            </div>
        </div>

        <!-- Scanner Interface -->
        <div id="view-scan" class="view active">
            <!-- Glowing Hologram Radar Orb -->
            <div class="orb-container">
                <div class="orb-outer-glow"></div>
                <div class="orb-ring" id="score-ring"></div>
                <div class="orb-core">
                    <div class="score-label">RISK LEVEL</div>
                    <div class="score-text" id="score-num">--</div>
                    <div class="score-percent">%</div>
                </div>
            </div>

            <!-- Threat Warning Box (Hidden by default) -->
            <div id="harm-display" class="harm-box">
                <div class="harm-header">
                    <span class="harm-alert-icon">⚠️</span>
                    <span class="harm-alert-title">SECURITY THREAT DETECTED</span>
                </div>
                <div class="harm-row">
                    <span class="harm-label">THREAT TYPE:</span>
                    <span class="harm-value" id="harm-cause"></span>
                </div>
                <div class="harm-row">
                    <span class="harm-label">IMPACT:</span>
                    <span class="harm-value" id="harm-effect"></span>
                </div>
            </div>

            <!-- System Diagnostics Data Grid -->
            <div class="data-grid">
                <div class="data-row">
                    <div class="row-header">
                        <span class="row-icon">🌐</span>
                        <span class="label">Target Hostname</span>
                    </div>
                    <span class="value" id="domain-name">Checking...</span>
                </div>
                <div class="data-row">
                    <div class="row-header">
                        <span class="row-icon">📅</span>
                        <span class="label">Domain Integrity Age</span>
                    </div>
                    <span class="value" id="domain-age">--</span>
                </div>
                <div class="data-row">
                    <div class="row-header">
                        <span class="row-icon">📡</span>
                        <span class="label">Threat Intel Feed</span>
                    </div>
                    <span class="value" id="vt-data">--</span>
                </div>
            </div>

            <!-- Action Controllers -->
            <div class="action-buttons">
                <button id="scan-btn" class="cyber-btn primary">
                    <span class="btn-glow"></span>
                    <span class="btn-text">🔄 RE-SCAN DOMAIN</span>
                </button>
                <button id="open-dashboard" class="cyber-btn secondary">
                    <span class="btn-glow"></span>
                    <span class="btn-text">📊 CORE DASHBOARD</span>
                </button>
            </div>
        </div>

        <!-- History Interface -->
        <div id="view-history" class="view">
            <div class="history-controls">
                <span class="history-title">Activity Logs</span>
                <span id="clear-history" class="clear-btn">✖ CLEAR ALL</span>
            </div>
            
            <!-- Custom Scrollable Log List -->
            <div class="history-scroll-panel">
                <div id="history-list" class="history-list">
                    <div class="empty-logs">No threat history detected.</div>
                </div>
            </div>

            <button id="btn-reset" class="cyber-btn warning">
                <span class="btn-glow"></span>
                <span class="btn-text">⚠️ RESET USER EXEMPTIONS</span>
            </button>
            <div class="btn-desc">(Clear manually whitelisted / bypassed domains)</div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
